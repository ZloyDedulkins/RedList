<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RedList — Актуальный список</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Актуальный список без комментариев</h1>
    <p class="hint">
      Показываются записи на максимальную дату, у которых пустое поле комментария.
    </p>

    <section class="status" id="status">Загрузка данных…</section>

    <section class="table-wrap" hidden id="resultSection">
      <table>
        <thead>
          <tr>
            <th>ФИО</th>
            <th>Подразделение</th>
            <th>Формат</th>
          </tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
